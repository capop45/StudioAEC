# Produção / simulação hospedada (nginx + API)
# Variáveis sensíveis vêm de .env (use .env.example como base).
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Key: ${JWT_KEY:?defina JWT_KEY no arquivo .env (mínimo 32 caracteres)}
      Jwt__Issuer: ${JWT_ISSUER:-StudioAEC}
      Jwt__Audience: ${JWT_AUDIENCE:-StudioAEC}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
