# Desenvolvimento local com hot-reload no frontend
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Key: ${JWT_KEY:-StudioAEC-Dev-Only-Insecure-Key-Min32Chars!!}
      Jwt__Issuer: StudioAEC
      Jwt__Audience: StudioAEC

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: http://api:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
