<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estúdio AEC - Mobile First</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --surface-hover: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-color: #2f81f7;
            --accent-hover: #388bfd;
            --danger-color: #f85149;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --radius-md: 10px;
            --header-height: 70px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Adaptável */
        header {
            height: var(--header-height);
            min-height: var(--header-height);
            padding: 0 20px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-brand i {
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .header-brand h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        #btn-back-mobile {
            display: none;
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            margin-left: -10px;
        }

        /* Container Principal */
        main {
            display: flex;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* Painel Esquerdo (Lista) */
        .sidebar {
            width: 350px;
            background-color: var(--bg-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* Painel Direito (Detalhes) */
        .main-content {
            flex: 1;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mobile Adjustments (O segredo da fluidez) */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                width: 100%;
                height: 100%;
            }
            .main-content {
                position: absolute;
                width: 100%;
                height: 100%;
                transform: translateX(100%); /* Escondido à direita */
            }

            /* Quando o modo detalhe está ativo */
            body.view-detail .sidebar {
                transform: translateX(-100%);
            }
            body.view-detail .main-content {
                transform: translateX(0);
            }
            body.view-detail #btn-back-mobile {
                display: block;
            }
            body.view-detail .header-brand {
                display: none;
            }
        }

        /* Estilização de Inputs e Botões */
        .panel-header {
            padding: 20px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        input {
            flex: 1;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 14px; /* Maior para touch */
            border-radius: var(--radius-md);
            font-size: 1rem;
            outline: none;
            color-scheme: dark;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cards e Listas */
        .list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .card-item {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            padding: 16px;
            gap: 12px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-item.active {
            border-color: var(--accent-color);
            background-color: var(--surface-hover);
        }

        .drag-handle {
            font-size: 1.4rem;
            color: var(--text-secondary);
            cursor: grab;
            padding: 5px;
        }

        .card-info {
            flex: 1;
        }

        .card-title {
            font-weight: 500;
            font-size: 1rem;
        }

        .card-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .btn-icon-danger {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            padding: 8px;
        }

        /* Estados de Agenda */
        .agenda-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .agenda-header h2 {
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .empty-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-view i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <header>
        <button id="btn-back-mobile" onclick="goBack()">
            <i class="ph ph-caret-left"></i> Voltar
        </button>
        <div class="header-brand">
            <i class="ph ph-hexagon-fill"></i>
            <h1>Estúdio AEC</h1>
        </div>
        <div style="width: 40px;"></div> </header>

    <main>
        <aside class="sidebar" id="sidebar">
            <div class="panel-header">
                <p style="color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; font-weight: 700;">Nova Reunião</p>
                <div class="input-wrapper">
                    <input type="datetime-local" id="input-date">
                    <button class="btn-primary" onclick="createMeeting()">
                        <i class="ph ph-plus-bold"></i>
                    </button>
                </div>
            </div>
            <div class="list-scroll" id="meeting-list"></div>
        </aside>

        <section class="main-content" id="main-content">
            <div id="active-meeting-view" style="display: none; flex-direction: column; height: 100%;">
                <div class="agenda-header">
                    <h2 id="display-meeting-date">Data da Reunião</h2>
                    <p id="display-meeting-count" style="font-size: 0.9rem; color: var(--text-secondary);">0 pautas definidas</p>
                </div>

                <div class="panel-header">
                    <div class="input-wrapper">
                        <input type="text" id="input-agenda" placeholder="Adicionar pauta..." onkeypress="checkEnter(event)">
                        <button class="btn-primary" onclick="addAgenda()">
                            <i class="ph ph-paper-plane-tilt-bold"></i>
                        </button>
                    </div>
                </div>

                <div class="list-scroll" id="agenda-list"></div>
            </div>

            <div id="no-selection" class="empty-view">
                <i class="ph ph-calendar-plus"></i>
                <p>Selecione uma reunião ou crie uma nova para gerenciar as pautas.</p>
            </div>
        </section>
    </main>

    <script>
        let meetings = JSON.parse(localStorage.getItem('aec_data_v2')) || [];
        let selectedId = null;

        // Renderiza as reuniões na barra lateral
        function renderMeetings() {
            const container = document.getElementById('meeting-list');
            container.innerHTML = '';

            meetings.forEach(m => {
                const isActive = m.id === selectedId;
                const div = document.createElement('div');
                div.className = `card-item ${isActive ? 'active' : ''}`;
                div.onclick = () => selectMeeting(m.id);
                
                const dateLabel = new Date(m.date).toLocaleString('pt-BR', {
                    day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
                });

                div.innerHTML = `
                    <div class="drag-handle"><i class="ph ph-dots-six-vertical"></i></div>
                    <div class="card-info">
                        <div class="card-title">${dateLabel}</div>
                        <div class="card-meta">${m.agendas.length} pautas</div>
                    </div>
                    <button class="btn-icon-danger" onclick="deleteMeeting(event, '${m.id}')">
                        <i class="ph ph-trash"></i>
                    </button>
                `;
                container.appendChild(div);
            });

            new Sortable(container, {
                handle: '.drag-handle',
                animation: 200,
                onEnd: (evt) => {
                    const item = meetings.splice(evt.oldIndex, 1)[0];
                    meetings.splice(evt.newIndex, 0, item);
                    save();
                }
            });
        }

        // Renderiza as pautas da reunião ativa
        function renderAgendas() {
            const container = document.getElementById('agenda-list');
            container.innerHTML = '';
            
            const meeting = meetings.find(m => m.id === selectedId);
            if (!meeting) return;

            document.getElementById('display-meeting-date').innerText = new Date(meeting.date).toLocaleString('pt-BR');
            document.getElementById('display-meeting-count').innerText = `${meeting.agendas.length} pautas definidas`;

            meeting.agendas.forEach(a => {
                const div = document.createElement('div');
                div.className = 'card-item';
                div.innerHTML = `
                    <div class="drag-handle"><i class="ph ph-dots-six-vertical"></i></div>
                    <div class="card-info">
                        <div class="card-title">${a.text}</div>
                    </div>
                    <button class="btn-icon-danger" onclick="deleteAgenda('${a.id}')">
                        <i class="ph ph-x-circle"></i>
                    </button>
                `;
                container.appendChild(div);
            });

            new Sortable(container, {
                handle: '.drag-handle',
                animation: 200,
                onEnd: (evt) => {
                    const item = meeting.agendas.splice(evt.oldIndex, 1)[0];
                    meeting.agendas.splice(evt.newIndex, 0, item);
                    save();
                }
            });
        }

        // Ações
        function createMeeting() {
            const dateVal = document.getElementById('input-date').value;
            if (!dateVal) return;

            const newM = {
                id: 'm' + Date.now(),
                date: dateVal,
                agendas: []
            };

            meetings.unshift(newM);
            save();
            renderMeetings();
            selectMeeting(newM.id);
        }

        function selectMeeting(id) {
            selectedId = id;
            document.body.classList.add('view-detail');
            document.getElementById('no-selection').style.display = 'none';
            document.getElementById('active-meeting-view').style.display = 'flex';
            renderMeetings();
            renderAgendas();
        }

        function addAgenda() {
            const input = document.getElementById('input-agenda');
            if (!input.value.trim()) return;

            const meeting = meetings.find(m => m.id === selectedId);
            meeting.agendas.push({ id: 'a' + Date.now(), text: input.value });
            
            input.value = '';
            save();
            renderAgendas();
            renderMeetings();
        }

        function deleteMeeting(e, id) {
            e.stopPropagation();
            meetings = meetings.filter(m => m.id !== id);
            if (selectedId === id) goBack();
            save();
            renderMeetings();
        }

        function deleteAgenda(aid) {
            const meeting = meetings.find(m => m.id === selectedId);
            meeting.agendas = meeting.agendas.filter(a => a.id !== aid);
            save();
            renderAgendas();
            renderMeetings();
        }

        function goBack() {
            document.body.classList.remove('view-detail');
            selectedId = null;
            renderMeetings();
        }

        function checkEnter(e) { if (e.key === 'Enter') addAgenda(); }

        function save() { localStorage.setItem('aec_data_v2', JSON.stringify(meetings)); }

        // Init
        renderMeetings();
    </script>
</body>
</html>
