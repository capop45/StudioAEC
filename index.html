<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio AEC - Gestão de Reuniões</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            /* Paleta de Cores - Dark Mode AEC Tech */
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --surface-hover: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-color: #2f81f7;
            --accent-hover: #388bfd;
            --danger-color: #f85149;
            
            /* Tipografia e Espaçamento */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --radius-md: 8px;
            --radius-lg: 12px;
            --transition-speed: 0.2s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Cabeçalho */
        header {
            padding: 20px 32px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        header i {
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        /* Layout Principal */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Painel Esquerdo (Reuniões) */
        .sidebar {
            width: 350px;
            background-color: var(--bg-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 24px 24px 16px;
        }

        .panel-header h2 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Formulários e Inputs */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input[type="datetime-local"],
        input[type="text"] {
            flex: 1;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: var(--radius-md);
            font-family: var(--font-family);
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition-speed);
            color-scheme: dark;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button.btn-add {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color var(--transition-speed);
        }

        button.btn-add:hover {
            background-color: var(--accent-hover);
        }

        /* Listas e Blocos (Cards) */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px;
        }

        .block-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all var(--transition-speed);
            user-select: none;
        }

        .block-card:hover {
            border-color: #484f58;
            background-color: var(--surface-hover);
        }

        .block-card.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 1px var(--accent-color);
        }

        .drag-handle {
            color: var(--text-secondary);
            cursor: grab;
            display: flex;
            align-items: center;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .card-content {
            flex: 1;
        }

        .card-title {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: color var(--transition-speed);
            display: flex;
            align-items: center;
        }

        .btn-delete:hover {
            color: var(--danger-color);
        }

        /* Painel Direito (Pautas) */
        .main-content {
            flex: 1;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        #agenda-section {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        /* Estilos específicos para a lista de pautas */
        .agenda-item {
            padding: 12px 16px;
            background-color: var(--bg-color);
        }
        
        .agenda-item.sortable-ghost {
            opacity: 0.4;
            background-color: var(--surface-hover);
        }

        .meeting-info-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .meeting-info-header h3 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .meeting-info-header span {
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>

    <header>
        <i class="ph ph-hexagon"></i>
        <h1>Estúdio AEC | Gestão de Agendas</h1>
    </header>

    <main>
        <aside class="sidebar">
            <div class="panel-header">
                <h2>Datas e Reuniões</h2>
                <div class="input-group">
                    <input type="datetime-local" id="new-meeting-date" title="Escolha a data e hora">
                    <button class="btn-add" onclick="addMeeting()" title="Criar nova reunião">
                        <i class="ph ph-plus"></i>
                    </button>
                </div>
            </div>
            <div class="list-container" id="meetings-list">
                </div>
        </aside>

        <section class="main-content">
            <div id="empty-state" class="empty-state">
                <i class="ph ph-calendar-blank"></i>
                <p>Selecione ou crie uma reunião ao lado <br> para gerenciar suas pautas.</p>
            </div>

            <div id="agenda-section" style="padding: 24px; display: none;">
                <div class="meeting-info-header">
                    <h3 id="current-meeting-title">Reunião</h3>
                    <span id="current-meeting-subtitle"><i class="ph ph-clock"></i> Data e Hora</span>
                </div>

                <div class="input-group" style="max-width: 600px;">
                    <input type="text" id="new-agenda-input" placeholder="Digite uma nova pauta e aperte Enter..." onkeypress="handleAgendaKeyPress(event)">
                    <button class="btn-add" onclick="addAgendaItem()" title="Adicionar pauta">
                        <i class="ph ph-plus"></i>
                    </button>
                </div>

                <div class="list-container" id="agenda-list" style="padding: 0; max-width: 600px; margin-top: 16px;">
                    </div>
            </div>
        </section>
    </main>

    <script>
        // Inicialização do Estado (Lendo do LocalStorage)
        let meetings = JSON.parse(localStorage.getItem('aec_meetings_data')) || [];
        let activeMeetingId = null;

        // Instâncias do SortableJS
        let sortableMeetings;
        let sortableAgendas;

        // Formatação de data/hora (Padrão BR)
        const formatDateTime = (dateString) => {
            const date = new Date(dateString);
            return new Intl.DateTimeFormat('pt-BR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            }).format(date);
        };

        // Salvar dados
        const saveData = () => {
            localStorage.setItem('aec_meetings_data', JSON.stringify(meetings));
        };

        // Renderizar a lista de Reuniões
        const renderMeetings = () => {
            const listElement = document.getElementById('meetings-list');
            listElement.innerHTML = '';

            meetings.forEach(meeting => {
                const isActive = meeting.id === activeMeetingId;
                const dateFormatted = formatDateTime(meeting.datetime);
                const pautasCount = meeting.agendas ? meeting.agendas.length : 0;

                const card = document.createElement('div');
                card.className = `block-card ${isActive ? 'active' : ''}`;
                card.dataset.id = meeting.id;
                card.onclick = () => selectMeeting(meeting.id);

                card.innerHTML = `
                    <div class="drag-handle" title="Arrastar">
                        <i class="ph ph-dots-six-vertical"></i>
                    </div>
                    <div class="card-content">
                        <div class="card-title">${dateFormatted}</div>
                        <div class="card-subtitle">${pautasCount} pauta(s)</div>
                    </div>
                    <button class="btn-delete" onclick="deleteMeeting('${meeting.id}', event)" title="Excluir reunião">
                        <i class="ph ph-trash"></i>
                    </button>
                `;
                listElement.appendChild(card);
            });

            // Inicializar/Atualizar Drag and Drop para Reuniões
            if (sortableMeetings) sortableMeetings.destroy();
            sortableMeetings = new Sortable(listElement, {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: function (evt) {
                    // Reordenar array
                    const itemEl = meetings.splice(evt.oldIndex, 1)[0];
                    meetings.splice(evt.newIndex, 0, itemEl);
                    saveData();
                },
            });
        };

        // Renderizar a lista de Pautas
        const renderAgendas = () => {
            const listElement = document.getElementById('agenda-list');
            listElement.innerHTML = '';
            
            const meeting = meetings.find(m => m.id === activeMeetingId);
            if (!meeting) return;

            (meeting.agendas || []).forEach(agenda => {
                const card = document.createElement('div');
                card.className = 'block-card agenda-item';
                card.dataset.id = agenda.id;

                card.innerHTML = `
                    <div class="drag-handle" title="Arrastar">
                        <i class="ph ph-dots-six-vertical"></i>
                    </div>
                    <div class="card-content">
                        <div class="card-title">${agenda.text}</div>
                    </div>
                    <button class="btn-delete" onclick="deleteAgenda('${agenda.id}')" title="Excluir pauta">
                        <i class="ph ph-trash"></i>
                    </button>
                `;
                listElement.appendChild(card);
            });

            // Inicializar/Atualizar Drag and Drop para Pautas
            if (sortableAgendas) sortableAgendas.destroy();
            sortableAgendas = new Sortable(listElement, {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: function (evt) {
                    const meetingIndex = meetings.findIndex(m => m.id === activeMeetingId);
                    const itemEl = meetings[meetingIndex].agendas.splice(evt.oldIndex, 1)[0];
                    meetings[meetingIndex].agendas.splice(evt.newIndex, 0, itemEl);
                    saveData();
                },
            });
        };

        // Adicionar nova Reunião
        const addMeeting = () => {
            const dateInput = document.getElementById('new-meeting-date');
            if (!dateInput.value) {
                alert('Por favor, selecione uma data e hora.');
                return;
            }

            const newMeeting = {
                id: 'meet_' + Date.now().toString(),
                datetime: dateInput.value,
                agendas: []
            };

            meetings.unshift(newMeeting); // Adiciona no topo
            saveData();
            dateInput.value = '';
            selectMeeting(newMeeting.id);
        };

        // Excluir Reunião
        const deleteMeeting = (id, event) => {
            event.stopPropagation(); // Evita acionar o clique do card
            if(confirm('Tem certeza que deseja excluir esta reunião e todas as suas pautas?')) {
                meetings = meetings.filter(m => m.id !== id);
                if (activeMeetingId === id) {
                    activeMeetingId = null;
                    updateMainPanelVisibility();
                }
                saveData();
                renderMeetings();
            }
        };

        // Selecionar Reunião
        const selectMeeting = (id) => {
            activeMeetingId = id;
            renderMeetings(); // Atualiza a classe 'active'
            updateMainPanelVisibility();
            
            const meeting = meetings.find(m => m.id === id);
            if (meeting) {
                document.getElementById('current-meeting-title').innerText = 'Pautas da Reunião';
                document.getElementById('current-meeting-subtitle').innerHTML = `<i class="ph ph-clock"></i> Agendado para: ${formatDateTime(meeting.datetime)}`;
                renderAgendas();
                document.getElementById('new-agenda-input').focus();
            }
        };

        // Adicionar nova Pauta
        const addAgendaItem = () => {
            const input = document.getElementById('new-agenda-input');
            const text = input.value.trim();
            
            if (!text || !activeMeetingId) return;

            const meeting = meetings.find(m => m.id === activeMeetingId);
            if (!meeting.agendas) meeting.agendas = [];
            
            meeting.agendas.push({
                id: 'agenda_' + Date.now().toString(),
                text: text
            });

            saveData();
            input.value = '';
            renderAgendas();
            renderMeetings(); // Para atualizar o contador de pautas na sidebar
        };

        // Lidar com o 'Enter' no input de pautas
        const handleAgendaKeyPress = (event) => {
            if (event.key === 'Enter') {
                addAgendaItem();
            }
        };

        // Excluir Pauta
        const deleteAgenda = (agendaId) => {
            const meeting = meetings.find(m => m.id === activeMeetingId);
            meeting.agendas = meeting.agendas.filter(a => a.id !== agendaId);
            saveData();
            renderAgendas();
            renderMeetings(); // Para atualizar o contador
        };

        // Alternar visibilidade do painel principal
        const updateMainPanelVisibility = () => {
            if (activeMeetingId) {
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('agenda-section').style.display = 'flex';
            } else {
                document.getElementById('empty-state').style.display = 'flex';
                document.getElementById('agenda-section').style.display = 'none';
            }
        };

        // Inicialização
        renderMeetings();
        updateMainPanelVisibility();
    </script>
</body>
</html>
